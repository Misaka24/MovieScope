<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MovieScope 首页草稿</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111317; color: #e2e2e8; font: 16px Inter, system-ui, sans-serif; }
    .wrap { width: min(680px, calc(100% - 40px)); }
    .brand { color: #f5c518; font-weight: 900; letter-spacing: .08em; }
    .links { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-top: 28px; }
    a { display: block; padding: 28px; background: #1e2024; color: inherit; text-decoration: none; border: 1px solid #4e4633; border-radius: 8px; }
    a:hover { border-color: #f5c518; }
    small { display: block; color: #9a9078; margin-top: 8px; }
    @media (max-width: 600px) { .links { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">MOVIESCOPE</div>
    <h1>首页设计草稿</h1>
    <p>选择一个方案进行对照审阅。</p>
    <div class="links">
      <a href="/home-1.html"><strong>首页方案一</strong><small>国际化内容门户，长页面、多媒体分区</small></a>
      <a href="/home-2.html"><strong>首页方案二</strong><small>中文电影首页，聚焦 Hero、榜单与资讯</small></a>
    </div>
  </main>
</body>
</html>
