services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [backend]

  api:
    image: ${API_IMAGE:-ghcr.io/your-github-user/moviescope-api:latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8787
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-8000}
      NODE_OPTIONS: ${NODE_OPTIONS:---dns-result-order=ipv4first}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    networks: [backend]

  web:
    image: ${WEB_IMAGE:-ghcr.io/your-github-user/moviescope-web:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    networks: [backend]

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
